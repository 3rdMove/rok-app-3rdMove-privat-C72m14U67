        cs++;}

    var paare=[];partnerIds(zielId).forEach(function(pid){var pk=findKom(pid);if(!pk)return;var bes=!!besitz[pid];paare.push({pk:pk,bes:bes,pkC:bes?konfigs[pid]:null});});

      else if(it.pkC&&it.pkC.stern<2)akt.push({typ:"partner",text:(de?"Partner "+it.pk.name+" auf 3★ bringen":"Bring "+it.pk.name+" to 3★"),detail:(de?"Aktuell "+SB[it.pkC.stern]+". Ab 3★ kann er als Sekundär mitgeführt werden.":"Currently "+SB[it.pkC.stern]+". From 3★ he can join as secondary."),f:"#6d28d9"});

// Dynamische globale Empfehlungsliste: WEN zuerst, WIE WEIT, WARUM
function calcEmpfehlung(konfigs,besitz,lang){
  try{
    var de=lang==="de";
    var items=[];
    // Bewertung jedes besessenen Kommandanten nach Ausbau-Wuerdigkeit
    KOM.forEach(function(k){
      if(!besitz[k.id])return;
      var c=konfigs[k.id]; if(!c)return;
      var rar=k.rar||"leg";
      // Nur kampfrelevante Raritaeten priorisieren
      if(rar==="adv"||rar==="eli")return;
      var tierScore={S:100,A:75,B:50,C:25,D:10}[k.tier]||10;
      // Fertigstellungsgrad
      var lv=c.lv,st=c.stern,sk=c.sk||[1,0,0,0];
      var skSum=sk[0]+sk[1]+sk[2]+sk[3];
      var fertig=(lv>=60&&st>=5&&skSum>=20);
      if(fertig)return; // fertige nicht mehr listen
      // Naehe zu einem Trigger-Meilenstein (Cap mit Sterngate) = Bonus
      var cap=levelCap(st);
      var meilenstein=(cap>=40&&cap<60&&st<5&&lv>=cap-6&&lv<cap);
      // Prioritaets-Score: hoeheres Tier + schon investiert (naeher an fertig) zuerst
      var invest=(lv/60)*30+(st/5)*30+(skSum/20)*20;
      var score=tierScore+invest*0.5+(meilenstein?15:0);
      // Empfohlenes naechstes Zwischenziel bestimmen
      var nextAction;
      if(st===0&&sk[0]<5){
        nextAction=de?"Skill 1 auf 5/5 bringen (Skulpturen), NICHT sternen":"Max skill 1 to 5/5 (sculptures), do NOT star up";
      } else if(meilenstein){
        nextAction=de?("Auf Lv "+cap+" leveln \u2013 Cap-Sprung mit Sterngate, Paket m\u00f6glich (vorher liquide bleiben)"):("Level to Lv "+cap+" \u2013 cap jump with star gate, bundle possible (stay liquid)");
      } else if(lv<cap){
        nextAction=de?("Auf Lv "+cap+" leveln (aktuelles Cap)"):("Level to Lv "+cap+" (current cap)");
      } else if(st<5){
        nextAction=de?((st+1)+"\u2605 \u2192 "+(st+2)+"\u2605 sternen (Star-EXP), hebt das Level-Cap"):("Star up "+(st+1)+"\u2605 \u2192 "+(st+2)+"\u2605 (star EXP), raises level cap");
      } else {
        nextAction=de?"Auf Lv 60 leveln, dann Skills auf 5/5/5/5":"Level to 60, then skills to 5/5/5/5";
      }
      items.push({k:k,c:c,score:score,action:nextAction,meilenstein:meilenstein,
        statusTxt:"Lv "+lv+" \u00b7 "+(st+1)+"\u2605 \u00b7 Skills "+sk[0]+"/"+sk[1]+"/"+sk[2]+"/"+sk[3]});
    });
    items.sort(function(a,b){return b.score-a.score;});
    return items.slice(0,8);
  }catch(e){return [];}
}


// Partner-IDs aus PAAR_KOMB (zentrale Wahrheitsquelle), Fallback auf k.p
function partnerIds(kid){
  for(var i=0;i<PAAR_KOMB.length;i++){
    if(PAAR_KOMB[i].id===kid)return PAAR_KOMB[i].pairs.map(function(pp){return pp.id;});
  }
  var k=findKom(kid);return (k&&k.p)?k.p:[];
}

// Dynamische Empfehlungsliste: was als Naechstes entwickeln?
function calcEmpfehlung(konfigs,besitz,zielId,lang){
  var de=lang==="de";
  var TIERW={S:100,A:70,B:45,C:20,D:5};
  var liste=[];
  KOM.forEach(function(k){
    if(!besitz[k.id])return;
    var c=konfigs[k.id]; if(!c)return;
    var rar=k.rar||"leg";
    // nur leg/epi sind sinnvolle Entwicklungsziele
    if(rar!=="leg"&&rar!=="epi")return;
    var fertig=(c.lv>=60&&c.stern>=5);
    var skN=skulpNoetig(c.sk||[1,0,0,0],rar);
    // Score: Tier-Wert + Fortschritts-Naehe (fast fertige zuerst) + Zielbonus
    var fortschritt=(c.lv/60)*0.5+(c.stern/5)*0.4+((rar==="leg"?680:440)-skN)/(rar==="leg"?680:440)*0.1;
    var score=(TIERW[k.tier]||10)*(0.5+0.5*fortschritt);
    if(k.id===zielId)score+=1000; // aktuelles Ziel immer oben
    // naechster sinnvoller Schritt
    var schritt,warum;
    var cap=levelCap(c.stern);
    if(fertig){schritt=de?"Fertig \u2013 Skills feilen":"Done \u2013 polish skills";warum=de?"Max-Level erreicht.":"Max level reached.";}
    else if(c.stern===0&&(c.sk&&c.sk[0]<5)){schritt=de?"Skill 1 auf 5 (vor dem Sternen!)":"Skill 1 to 5 (before starring!)";warum=de?"Skill-Lock nutzen: bei 1\u2605 fliesst alles in Skill 1.":"Use skill lock: at 1\u2605 everything goes into skill 1.";}
    else if(c.lv>=cap-6&&c.lv<cap&&cap>=40&&cap<60){schritt=de?"Auf Lv "+cap+" bringen":"Level to "+cap;warum=de?"Cap-Sprung mit Sterngate \u2013 l\u00f6st Meilenstein-Paket aus.":"Cap jump with star gate \u2013 triggers milestone bundle.";}
    else if(c.lv<cap){schritt=de?"Leveln bis Lv "+cap:"Level up to "+cap;warum=de?"Bis zum aktuellen Level-Cap auff\u00fcllen.":"Fill up to current level cap.";}
    else if(c.stern<5){schritt=de?(c.stern+1)+"\u2605 \u2192 "+(c.stern+2)+"\u2605":(c.stern+1)+"\u2605 \u2192 "+(c.stern+2)+"\u2605";warum=de?"Sterngate \u00f6ffnet n\u00e4chsten Level-Cap.":"Star gate opens next level cap.";}
    else {schritt=de?"Leveln bis Lv 60":"Level to 60";warum=de?"Endausbau.":"Final build.";}
    liste.push({k:k,c:c,score:score,fertig:fertig,schritt:schritt,warum:warum,skN:skN});
  });
  liste.sort(function(a,b){
    if(a.fertig!==b.fertig)return a.fertig?1:-1; // fertige nach unten
    return b.score-a.score;
  });
  return liste;
}

// Roster-Strategie: ressourcenbasierte Reihenfolge ueber den gesamten Bestand
function calcRoster(zielId,konfigs,besitz,starExp,expBaende,lang){
  try{
    var de=lang==="de";
    var zK=findKom(zielId); if(!zK)return null;
    var zC=konfigs[zielId]; if(!zC)return null;
    var steps=[];
    // Partnerwahl: erster besessener aus der Empfehlungsliste, sonst Freischalt-Empfehlung
    var pOwn=null,pMiss=null;
    partnerIds(zielId).forEach(function(pid){var pk=findKom(pid);if(!pk)return;if(besitz[pid]&&!pOwn)pOwn={k:pk,c:konfigs[pid]};if(!besitz[pid]&&!pMiss)pMiss=pk;});
    // 0) Skill-Lock-Warnung fuers Ziel
    var zsk=zC.sk||[1,0,0,0];
    if(zC.stern===0&&zsk[0]<5){
      steps.push({text:de?"Skill-Lock: "+zK.name+" jetzt NICHT sternen":"Skill lock: do NOT star up "+zK.name+" yet",
        detail:de?"Bei 1\u2605 fließen alle Skulpturen garantiert in Skill 1 (aktuell "+zsk[0]+"/5). Erst Skill 1 auf 5 bringen, dann sternen \u2013 nach dem Sternsprung treffen Upgrades zufällig jeden freigeschalteten Skill.":"At 1\u2605 all sculptures are guaranteed to go into skill 1 (currently "+zsk[0]+"/5). Max skill 1 first, then star up \u2013 afterwards upgrades hit a random unlocked skill.",f:"#b91c1c"});
    }
    // 1) Simulation: Vorraete ins Ziel
    var lv=zC.lv,st=zC.stern,eb=expBaende,se=starExp,guard=0,stop=null,parts=[];
    while(!(lv>=60&&st>=5)&&guard++<24){
      var cap=levelCap(st);
      if(lv<cap||(st>=5&&lv<60)){
        var zl=(st>=5)?60:cap, need=expB(lv,zl);
        if(eb>=need){parts.push("Lv "+lv+"\u2192"+zl);eb-=need;lv=zl;}
        else{var r=lv;while(r<zl&&expB(lv,r+1)<=eb)r++;
          if(r>lv){parts.push("Lv "+lv+"\u2192"+r);eb-=expB(lv,r);lv=r;}
          stop={typ:"xp",fehlt:Math.ceil(expB(lv,zl)),bis:zl};break;}
      } else if(st<5){
        var ks=STAR_EXP_KOST[st]||0;
        if(se>=ks){parts.push((st+1)+"\u2605\u2192"+(st+2)+"\u2605");se-=ks;st++;}
        else{stop={typ:"star",fehlt:ks-se,star:st+2};break;}
      } else break;
    }
    var d1;
    if(parts.length===0&&expBaende===0&&starExp===0){
      d1=de?"Trage oben EXP-Bände und Star-EXP-Vorräte ein \u2013 dann rechnet die Engine aus, wie weit du kommst und wo der Engpass liegt.":"Enter XP tomes and star EXP stock above \u2013 the engine then computes how far you get and where the bottleneck is.";
    }else{
      d1=(de?"Reichweite deiner Vorräte: ":"Your stock reaches: ")+(parts.length?parts.join(", ")+(de?" \u2192 Endstand Lv ":" \u2192 ends at Lv ")+lv+" / "+(st+1)+"\u2605.":(de?"kein Fortschritt möglich.":"no progress possible."));
      if(stop)d1+=stop.typ==="xp"?(de?" Engpass: ~"+stop.fehlt+" Bände fehlen bis Lv "+stop.bis+".":" Bottleneck: ~"+stop.fehlt+" tomes missing to Lv "+stop.bis+"."):(de?" Engpass: "+stop.fehlt.toLocaleString("de")+" Star-EXP fehlen für den "+stop.star+"\u2605-Sprung.":" Bottleneck: "+stop.fehlt.toLocaleString("en")+" star EXP missing for the "+stop.star+"\u2605 jump.");
    }
    d1+=de?" Grundregel: Star-EXP ausschließlich für die Pflicht-Gates des Ziels reservieren.":" Ground rule: reserve star EXP exclusively for the target's mandatory gates.";
    steps.push({text:de?"Vorräte zuerst komplett in "+zK.name:"All stock into "+zK.name+" first",detail:d1,f:"#1d4ed8"});
    // 2) Partner
    if(pOwn){
      var pc=pOwn.c,pn=pOwn.k.name,psk=pc.sk||[1,0,0,0],pt,pd;
      if(pc.stern>=2){pt=de?"Partner "+pn+" ist einsatzbereit":"Partner "+pn+" is ready";pd=de?"Mit "+(pc.stern+1)+"\u2605 mitführbar. Weitere Investitionen erst, wenn "+zK.name+" durch ist.":"At "+(pc.stern+1)+"\u2605 he can join. Invest further only once "+zK.name+" is done.";}
      else{var pk2=starExpBen(pc.stern,2);pt=de?"Danach: Partner "+pn+" auf 3\u2605":"Then: partner "+pn+" to 3\u2605";
        pd=(de?"Ab 3\u2605 als Sekundär mitführbar (~"+pk2.toLocaleString("de")+" Star-EXP).":"From 3\u2605 he can join as secondary (~"+pk2.toLocaleString("en")+" star EXP).");
        if(pc.stern===0&&psk[0]<5)pd+=de?" Aber: erst Skill 1 auf 5 (aktuell "+psk[0]+"/5), Skill-Lock gilt auch hier.":" But: max skill 1 first (currently "+psk[0]+"/5), the skill lock applies here too.";
        pd+=de?" Priorität 2 \u2013 erst bedienen, wenn die Gates von "+zK.name+" gedeckt sind.":" Priority 2 \u2013 serve only after "+zK.name+"'s gates are covered.";}
      steps.push({text:pt,detail:pd,f:"#6d28d9"});
    } else if(pMiss){
      steps.push({text:de?"Partner freischalten: "+pMiss.name:"Unlock partner: "+pMiss.name,detail:de?"Bestes Paar mit "+zK.name+". Quellen: Events, Taverne, KvK-Shop. Bis dahin den besten vorhandenen Sekundär nutzen.":"Best pair with "+zK.name+". Sources: events, tavern, KvK shop. Until then use your best available secondary.",f:"#b91c1c"});
    }
    // 3b) Meilenstein-Pakete (belegt: Trigger an hohen Kommandanten-Meilensteinen)

      if(cap>=40&&cap<60&&c.stern<5&&c.lv>=cap-6&&c.lv<cap)naheLv=cap;

        ,f:"#0e7490"});
    }
    // 4) Stopp-Liste
    var stoppN=[];KOM.forEach(function(k){if(besitz[k.id]&&(k.rar==="adv"||k.rar==="eli")&&k.id!==zielId)stoppN.push(k.name);});
    if(stoppN.length){
      steps.push({text:de?"Stopp-Liste: hier nichts mehr investieren":"Stop list: invest nothing further here",
        detail:(de?"Keine Skulpturen oder Star-EXP in: ":"No sculptures or star EXP into: ")+stoppN.join(", ")+(de?". Sammlerinnen (Constance, Mathilde, \u0160\u00e1rka) nur bis Lv 30 leveln \u2013 mehr Talentpunkte bringen kaum Ertrag. Diese Gruppe dient nur noch als Trigger-Vehikel und Füllmarsch.":". Level gatherers (Constance, Mathilde, \u0160\u00e1rka) only to Lv 30 \u2013 extra talent points barely pay off. This group only serves as trigger vehicle and filler march."),f:"#6b7280"});
    }
    // 5) Naechstes Ziel nach Abschluss
    var kand=[];
    KOM.forEach(function(k){
      if(!besitz[k.id]||k.id===zielId||k.tier!=="S")return;

      kand.push({k:k,c:c,fo:fo});
    });
    kand.sort(function(a,b){return b.fo-a.fo;});
    if(kand.length){

function formAusText(txt){
  if(!txt)return null;
  var t=txt.toLowerCase();
  if(t.indexOf("delta")>=0)return "delta";
  if(t.indexOf("pincer")>=0||t.indexOf("schmetter")>=0)return "pincer";
  if(t.indexOf("keil")>=0)return "keil";
  if(t.indexOf("staffel")>=0||t.indexOf("echelon")>=0)return "staggered";
  if(t.indexOf("hohlquadrat")>=0)return "hohlquadrat";
  if(t.indexOf("testudo")>=0)return "testudo";
  if(t.indexOf("kreis")>=0)return "kreis";
  if(t.indexOf("dreifachlinie")>=0)return "dreifachlinie";
  if(t.indexOf("linie")>=0||t.indexOf("linien")>=0)return "linie";
  if(t.indexOf("bogen")>=0)return "bogen";
  return null;
}

var GLOS={"arthur":{"sk":{"de":"Top-Allrounder: Die aktive Fähigkeit liefert hohen Direktschaden und startet eine Combo, bei der Folgeangriffe zusätzlich verstärkt werden. Dazu Eigen-Buffs auf Angriff und Schadensreduktion – funktioniert mit Kavallerie und Infanterie gleichermaßen. Skill-Priorität: S1 zuerst auf 5, danach S4. Expertise verstärkt die Combo-Kette nochmals deutlich.","en":"Top all-rounder: the active deals high direct damage and starts a combo that empowers follow-up attacks, plus self-buffs to attack and damage reduction – works with cavalry and infantry alike. Priority: S1 first, then S4. Expertise further boosts the combo chain."},"ta":{"de":"Feld-Build: zuerst den Geschick-Baum komplett bis zum Schlussstein ausbauen (mehr Wut pro Angriff, höherer Skill-Schaden), danach den Kavallerie-Baum über Angriff und Marschtempo füllen; letzte Punkte in Mobilität für schnellen Wut-Start. Logik: Arthurs Combo lebt von hoher Skill-Frequenz – alles, was Wut erzeugt und Skill-Schaden erhöht, schlägt reine Stat-Talente. Läuft er mit Infanterie, gilt dieselbe Logik über den Infanterie-Baum. Für Rallyes bleibt der Build identisch; defensive Talente sind verzichtbar.","en":"Field build: complete the Skill tree first up to its keystone (more rage per attack, higher skill damage), then fill the Cavalry tree via attack and march speed; final points into Mobility for a fast rage start. Logic: Arthur's combo lives on skill frequency – anything generating rage or boosting skill damage beats plain stat talents. With infantry, same logic via the Infantry tree. Rally build is identical; defensive talents are skippable."},"fo":{"de":"Keilformation (+5 % Skill-Schaden). Aufrüstungen mit Attributen deines gefahrenen Truppentyps (Angriff/Verteidigung/Gesundheit). Inschriften-Priorität: Skill-Schaden, danach Truppen-Attribute.","en":"Wedge (+5% skill damage). Armaments with your troop type stats (attack/defense/health). Inscription priority: skill damage, then troop attributes."}},"huo_qubing":{"sk":{"de":"Stärkster Kavallerie-Burst im Spiel: Die aktive Fähigkeit trifft im Fächer extrem hart, Zusatzeffekte lösen weiteren Schaden aus, und die Wut-Ökonomie ist hervorragend. Skaliert fast vollständig über Skill-Schaden – S1 zwingend zuerst auf 5; Expertise hebt den Burst auf Meta-Niveau.","en":"Strongest cavalry burst in the game: the fan-shaped active hits extremely hard, extra effects trigger more damage, and rage economy is excellent. Scales almost entirely on skill damage – max S1 first; expertise lifts the burst to meta level."},"ta":{"de":"Geschick-Baum komplett zuerst (Wut-Generierung, Skill-Schaden-Schlussstein), dann Kavallerie-Baum mit Fokus auf Angriff und Marschtempo; Restpunkte in Mobilität. Huo will die aktive Fähigkeit so oft wie möglich zünden – Wut-Talente schlagen alles. Defensive Talente bewusst auslassen: Er gewinnt über Tempo und Burst, nicht über Zähigkeit.","en":"Complete the Skill tree first (rage generation, skill-damage keystone), then the Cavalry tree focused on attack and march speed; leftovers into Mobility. Huo wants to fire his active as often as possible – rage talents beat everything. Deliberately skip defensive talents: he wins through tempo and burst, not toughness."},"fo":{"de":"Keilformation. Aufrüstungen: Kavallerie-Angriff/-Gesundheit. Inschriften: Skill-Schaden zuerst, dann Kav-Angriff.","en":"Wedge. Armaments: cavalry attack/health. Inscriptions: skill damage first, then cavalry attack."}},"bai_qi":{"sk":{"de":"Aggressive Infanterie: starker Flächenschaden, Selbst-Buffs auf Angriff und Bonusschaden gegen bereits geschwächte Ziele – baut im offenen Feld konstant Druck auf. S1 zuerst, dann S4; Expertise verbessert die Buff-Uptime.","en":"Aggressive infantry: strong AoE damage, self attack buffs and bonus damage against weakened targets – constant pressure in the open field. S1 first, then S4; expertise improves buff uptime."},"ta":{"de":"Zuerst Geschick (Wut + Skill-Schaden), anschließend Infanterie-Baum über Angriff und Gesundheit – Infanterie profitiert stärker von etwas Zähigkeit als Kavallerie. Wenige Restpunkte in Schadensreduktions-Talente. Ziel: hohe Skill-Frequenz bei genug Standfestigkeit für lange Feldkämpfe.","en":"Skill tree first (rage + skill damage), then the Infantry tree via attack and health – infantry benefits more from some toughness than cavalry. Few leftover points into damage-reduction talents. Goal: high skill frequency with enough staying power for long field fights."},"fo":{"de":"Keilformation. Aufrüstungen: Infanterie-Angriff/-Gesundheit. Inschriften: Skill-Schaden + Infanterie-Attribute.","en":"Wedge. Armaments: infantry attack/health. Inscriptions: skill damage + infantry attributes."}},"gang_gamchan":{"sk":{"de":"Combo-Kavallerie: Fähigkeiten verketten sich und verstärken den Folgeschaden, dazu solide Eigenverteidigung – stark in längeren Feldgefechten und als Rallye-Option. S1 vor allem anderen maxen.","en":"Combo cavalry: skills chain and empower follow-up damage, with solid self-defense – strong in longer fights and rallies. Max S1 first."},"ta":{"de":"Geschick-Kernpfad bis zum Schlussstein, danach Kavallerie-Baum (Angriff, Marschtempo). Seine Combo läuft über verkettete Skills, daher zählt Wut-Aufbau doppelt. Rallye- und Feld-Build identisch.","en":"Skill-tree core path to the keystone, then the Cavalry tree (attack, march speed). His combo runs on chained skills, so rage counts double. Rally and field builds are identical."},"fo":{"de":"Keilformation. Aufrüstungen: Kavallerie-Attribute. Inschriften: Skill-Schaden zuerst.","en":"Wedge. Armaments: cavalry attributes. Inscriptions: skill damage first."}},"qin_shi":{"sk":{"de":"Bogenschützen-Kontrolle: hoher AoE-Skill-Schaden kombiniert mit Debuffs und Kontrolleffekten, die gegnerische Märsche ausbremsen – Standard-Primär der Bogen-Meta im Feld und in Rallyes. S1 zuerst, danach S4.","en":"Archer control: high AoE skill damage combined with debuffs and control effects that slow enemy marches – the standard archer meta primary in field and rallies. S1 first, then S4."},"ta":{"de":"Geschick-Baum komplett (Wut pro Angriff, Skill-Schaden), dann Bogenschützen-Baum über Angriff; Restpunkte in Überlebens- und Marschtempo-Talente. Bogenschützen sind fragil – ein kleiner defensiver Anteil lohnt, der Skill-Schaden bleibt aber klar vorn. Gleicher Build für Feld und Rallye.","en":"Complete the Skill tree (rage per attack, skill damage), then the Archer tree via attack; leftovers into survival and march-speed talents. Archers are fragile – a small defensive share pays off, but skill damage stays clearly first. Same build for field and rally."},"fo":{"de":"Keilformation. Aufrüstungen: Bogenschützen-Angriff/-Gesundheit. Inschriften: Skill-Schaden zuerst.","en":"Wedge. Armaments: archer attack/health. Inscriptions: skill damage first."}},"zhuge_liang":{"sk":{"de":"Support-Bogenschütze: verstärkt den Schaden des Paars, debufft Ziele und steuert eigenen Skill-Schaden bei – das Meta-Pendant zu Qin Shi Huang, meist als Sekundär. Als Sekundär zählen nur seine Skills (nicht Talente/Formation) – Skills trotzdem voll maxen.","en":"Support archer: amplifies the pair's damage, debuffs targets and adds own skill damage – the meta partner for Qin Shi Huang, usually secondary. As secondary only his skills count (not talents/formation) – still max them."},"ta":{"de":"Nur als Primär relevant: Geschick-Baum komplett, dann Bogenschützen-Baum (Angriff vor Gesundheit). Im Meta-Einsatz als Sekundär hinter Qin Shi Huang zählen Talente nicht – dort entscheiden allein seine Skill-Stufen.","en":"Only relevant as primary: complete the Skill tree, then the Archer tree (attack before health). In the meta secondary role behind Qin Shi Huang talents do not apply – only his skill levels matter there."},"fo":{"de":"Als Sekundär gilt die Formation des Primärs. Als Primär: Keilformation mit Bogen-Aufrüstungen, Inschrift Skill-Schaden.","en":"As secondary, the primary's formation applies. As primar
