function calcStrategie(zielId,konfigs,besitz,gold,lang){
  try{
    var T=TXT[lang];
    var zK=findKom(zielId); if(!zK)return null;
    var zC=konfigs[zielId]; if(!zC)return null;
    var expBis60=expB(zC.lv,60),skulpMax=skulpBen(zC.stern,MAX_STERN);
    var eigene=zC.skulp,gesamt=eigene+gold,fehlt=Math.max(0,skulpMax-gesamt);
    var lv60=zC.lv>=60,maxStern=zC.stern>=MAX_STERN;
    var fort=Math.round(((zC.lv/60)*50+(zC.stern/MAX_STERN)*50));
    var pakete=[];
    KOM.forEach(function(k){if(k.id===zielId||!besitz[k.id])return;var kC=konfigs[k.id];if(!kC)return;var p=nP(kC.lv);if(!p)return;var diff=p.level-kC.lv,kosten=expB(kC.lv,p.level),roi=kosten>0?Math.round(p.skulp/kosten*10)/10:999;pakete.push({k:k,kC:kC,p:p,diff:diff,kosten:kosten,roi:roi});});
    pakete.sort(function(a,b){return b.roi-a.roi;});pakete=pakete.slice(0,4);
    var paare=[];(zK.p||[]).forEach(function(pid){var pk=findKom(pid);if(!pk)return;var bes=!!besitz[pid];paare.push({pk:pk,bes:bes,pkC:bes?konfigs[pid]:null});});
    var akt=[];
    var nm=lang==="de"?zK.name:zK.name;
    if(!lv60)akt.push({pri:1,text:(lang==="de"?nm+" von Level "+zC.lv+" auf 60 leveln":"Level "+nm+" from "+zC.lv+" to 60"),detail:(lang==="de"?"Benötigt ca. "+expBis60+" EXP-Bände (à 50.000 XP)":"Needs ~"+expBis60+" XP tomes (50,000 XP each)"),f:L.blue});
    if(gold>0&&!maxStern)akt.push({pri:2,text:(lang==="de"?gold+" universelle Skulpturen verfügbar":gold+" universal sculptures available"),detail:(lang==="de"?"Eigene: "+eigene+" + Vorrat: "+gold+" = "+gesamt+" · Noch "+fehlt+" bis Meister":"Own: "+eigene+" + stock: "+gold+" = "+gesamt+" · "+fehlt+" left to Master"),f:L.gold});
    if(pakete.length>0&&!maxStern){var tp=pakete[0];akt.push({pri:tp.diff<=5?2:4,text:(lang==="de"?tp.k.name+" auf Level "+tp.p.level+" (+"+tp.diff+" Level)":tp.k.name+" to level "+tp.p.level+" (+"+tp.diff+")"),detail:(lang==="de"?"~"+tp.kosten+" EXP-Bände → +"+tp.p.skulp+" Skulpturen für "+nm:"~"+tp.kosten+" XP tomes → +"+tp.p.skulp+" sculptures for "+nm),f:L.gold});}
    if(fehlt>0)akt.push({pri:3,text:(lang==="de"?fehlt+" Skulpturen für "+nm+" nötig":fehlt+" sculptures needed for "+nm),detail:(lang==="de"?"Vorhanden: "+gesamt+" · Ziel: "+skulpMax+" für Meister":"Available: "+gesamt+" · Goal: "+skulpMax+" for Master"),f:L.acc});
    paare.forEach(function(it){if(!it.bes)akt.push({pri:5,text:(lang==="de"?it.pk.name+" freischalten":"Unlock "+it.pk.name),detail:(lang==="de"?"Bester Partner für "+nm+" – fehlt noch.":"Best partner for "+nm+" – still missing."),f:L.red});else if(it.pkC&&it.pkC.stern<3)akt.push({pri:4,text:(lang==="de"?it.pk.name+" auf mindestens 3★":it.pk.name+" to at least 3★"),detail:(lang==="de"?"Aktuell: "+TXT[lang].sternBez[it.pkC.stern]:"Currently: "+TXT[lang].sternBez[it.pkC.stern]),f:"#6d28d9"});});
    akt.sort(function(a,b){return a.pri-b.pri;});
    return {zK:zK,zC:zC,expBis60:expBis60,skulpMax:skulpMax,eigene:eigene,gesamt:gesamt,fehlt:fehlt,lv60:lv60,maxStern:maxStern,fort:fort,pakete:pakete,paare:paare,akt:akt};
  }catch(e){return null;}
}
